<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sandarna – Träningsplanering</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f1ea;--surface:#ebe5d4;--card:#ffffff;--card2:#faf6ec;--border:#dcd4bf;--primary:#3d6b4a;--primary-dark:#27482f;--primary-soft:rgba(61,107,74,0.10);--accent:#e8b94a;--accent-dark:#b88a1f;--text:#2c3138;--muted:#7a7568;--ok:#3a8a3e;--warn:#c89200;--error:#c14545;--shadow:0 1px 2px rgba(45,55,72,0.04),0 2px 8px rgba(45,55,72,0.05);--fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}html{-webkit-text-size-adjust:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100dvh;}

  /* AUTH */
  #auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .auth-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:32px 24px;width:100%;max-width:380px;box-shadow:var(--shadow);}
  .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
  .auth-crest{width:44px;height:44px;background:var(--primary);clip-path:polygon(50% 0%,100% 20%,100% 80%,50% 100%,0% 80%,0% 20%);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:900;font-size:13px;color:#fff;flex-shrink:0;}
  .auth-logo h1{font-family:var(--fd);font-weight:900;font-size:24px;letter-spacing:2px;text-transform:uppercase;line-height:1;}
  .auth-logo h1 span{color:var(--primary);}
  .auth-tabs{display:flex;margin-bottom:24px;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
  .auth-tab{flex:1;background:none;border:none;color:var(--muted);font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:10px;cursor:pointer;transition:all .2s;}
  .auth-tab.active{background:var(--primary);color:#fff;}
  .auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .auth-field label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;}
  .auth-field input{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--fb);font-size:16px;padding:11px 12px;outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s;}
  .auth-field input:focus{border-color:var(--primary);}
  .auth-error{font-size:13px;color:var(--error);margin-bottom:12px;min-height:18px;}
  .auth-submit{width:100%;background:var(--primary);color:#fff;border:none;border-radius:3px;font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .2s;}
  .auth-submit:active{background:var(--primary-dark);}

  /* HEADER */
  header{background:var(--card);border-bottom:3px solid var(--primary);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
  .crest{width:36px;height:36px;background:var(--primary);flex-shrink:0;clip-path:polygon(50% 0%,100% 20%,100% 80%,50% 100%,0% 80%,0% 20%);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:900;font-size:11px;color:#fff;}
  header h1{font-family:var(--fd);font-weight:900;font-size:20px;letter-spacing:2px;text-transform:uppercase;line-height:1;}
  header h1 span{color:var(--primary);}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .user-email{font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .btn-signout{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:2px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .btn-signout:active{border-color:var(--primary);color:var(--text);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;}
  .sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
  .sync-dot.ok{background:var(--ok);}.sync-dot.err{background:var(--error);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* TABS */
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:12px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;-webkit-tap-highlight-color:transparent;}
  .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}

  main{padding:14px;max-width:1100px;margin:0 auto;}
  .tab-panel{display:none;}.tab-panel.active{display:block;}

  .section-title{font-family:var(--fd);font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:2px;background:linear-gradient(to right,var(--primary),transparent);}

  .form-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;box-shadow:var(--shadow);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid.three{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:560px){.form-grid,.form-grid.three{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;}
  .field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--fb);font-size:16px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);}
  .field textarea{resize:vertical;min-height:80px;}
  .field select option{background:var(--surface);}
  .mt12{margin-top:12px;}

  .theme-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .theme-pill{padding:7px 11px;border:1px solid var(--border);border-radius:2px;font-size:11px;font-family:var(--fd);font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:none;color:var(--muted);transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .theme-pill.selected{background:var(--primary);border-color:var(--primary);color:#fff;}

  .form-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end;}
  @media(max-width:480px){.form-actions{flex-direction:column-reverse;}.form-actions .btn{width:100%;text-align:center;}}

  .btn{font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;padding:12px 18px;border:none;border-radius:3px;cursor:pointer;transition:all .2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .btn-primary{background:var(--primary);color:#fff;}.btn-primary:active{background:var(--primary-dark);}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}.btn-ghost:active{border-color:var(--primary);color:var(--text);}
  .btn-sm{font-size:11px;padding:8px 12px;letter-spacing:1.2px;}
  .btn-danger{background:none;border:1px solid #e2bcbc;color:var(--error);}.btn-danger:active{background:var(--error);color:#fff;border-color:var(--error);}
  .btn-warning{background:none;border:1px solid #e8d49c;color:var(--accent-dark);}.btn-warning:active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .search-input{background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--fb);font-size:16px;padding:10px 12px;outline:none;width:100%;margin-bottom:10px;-webkit-appearance:none;}
  .search-input:focus{border-color:var(--primary);}

  .pills-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:14px;}
  .pills-scroll::-webkit-scrollbar{display:none;}
  .filter-pill{flex-shrink:0;padding:8px 13px;border:1px solid var(--border);border-radius:2px;font-size:11px;font-family:var(--fd);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;background:none;color:var(--muted);white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .filter-pill.active{border-color:var(--primary);color:var(--text);background:var(--primary-soft);}

  .drill-type-badge{display:inline-block;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-bottom:8px;}
  .b-Uppvärmning{background:#fff1cf;color:#7a5c00;}.b-Teknik{background:#dceaf6;color:#1f4a78;}
  .b-Taktik{background:#dcefdc;color:#2c6d33;}.b-Fysik{background:#ebe0f3;color:#5d3a8a;}
  .b-Avslutning{background:#f9dcdc;color:#8a2c2c;}.b-Match{background:#fce6c4;color:#8a5a10;}

  .drills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  @media(max-width:600px){.drills-grid{grid-template-columns:1fr;}}
  .drill-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color .2s, transform .15s;box-shadow:var(--shadow);}
  .drill-card.in-session{border-color:var(--primary);background:var(--primary-soft);}
  .drill-card h3{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:5px;}
  .drill-meta{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;flex-wrap:wrap;gap:10px;}
  .drill-desc{font-size:13px;color:#55606b;line-height:1.5;margin-bottom:10px;}
  .dtag{font-size:11px;background:var(--primary-soft);border:1px solid rgba(61,107,74,0.3);color:var(--primary);display:inline-block;padding:2px 8px;border-radius:2px;font-family:var(--fd);letter-spacing:1px;text-transform:uppercase;}
  .added-by{font-size:11px;color:var(--muted);margin-top:8px;}
  .drill-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

  /* EDIT MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0;}
  @media(min-width:600px){.modal-overlay{align-items:center;padding:20px;}}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:6px 6px 0 0;width:100%;max-width:540px;max-height:90dvh;overflow-y:auto;padding:20px;}
  @media(min-width:600px){.modal{border-radius:6px;}}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .modal-title{font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;line-height:1;-webkit-tap-highlight-color:transparent;}
  .modal-close:active{color:var(--text);}
  .modal-overlay.hidden{display:none;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:660px){.two-col{grid-template-columns:1fr;}}
  .col-label{font-family:var(--fd);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

  .picker-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;}
  .picker-item{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:11px 13px;display:flex;align-items:center;gap:10px;}
  .picker-item.in-session{border-color:var(--primary);}
  .picker-item-info{flex:1;min-width:0;}
  .picker-item-name{font-family:var(--fd);font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .picker-item-meta{font-size:12px;color:var(--muted);margin-top:2px;}

  .session-list{display:flex;flex-direction:column;gap:8px;}
  .session-item{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:11px 13px;display:flex;align-items:center;gap:10px;}
  .snum{width:26px;height:26px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:900;flex-shrink:0;}
  .session-item-info{flex:1;min-width:0;}
  .session-item-name{font-family:var(--fd);font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .session-item-meta{font-size:12px;color:var(--muted);margin-top:2px;}

  .empty-state{text-align:center;padding:36px 16px;color:var(--muted);border:1px dashed var(--border);border-radius:4px;}
  .empty-state .icon{font-size:36px;margin-bottom:8px;}
  .empty-state p{font-size:13px;}

  .saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  @media(max-width:600px){.saved-grid{grid-template-columns:1fr;}}
  .saved-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow);}
  .saved-card h3{font-family:var(--fd);font-size:19px;font-weight:900;margin-bottom:6px;}
  .saved-card .meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;}
  .saved-card .dlist{font-size:12px;color:#55606b;line-height:1.9;}
  .saved-card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

  .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}

  .loading-overlay{position:fixed;inset:0;background:rgba(244,241,234,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:150;gap:16px;}
  .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay p{font-family:var(--fd);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--primary);color:#fff;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:11px 20px;border-radius:3px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ICONS (Lucide, MIT) */
  .icon{width:1em;height:1em;vertical-align:-0.18em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .icon-lg{width:1.25em;height:1.25em;vertical-align:-0.25em;}
  .icon-xl{width:38px;height:38px;}
  .btn .icon,.tab-btn .icon,.filter-pill .icon,.btn-signout .icon,.reorder-btn .icon{margin-right:6px;}
  .btn .icon:last-child,.tab-btn .icon:last-child,.filter-pill .icon:last-child,.reorder-btn .icon:last-child{margin-right:0;margin-left:6px;}
  .btn .icon:only-child,.tab-btn .icon:only-child,.filter-pill .icon:only-child,.reorder-btn .icon:only-child{margin:0;}
  .drill-meta .icon,.saved-card .meta .icon{width:14px;height:14px;vertical-align:-2px;margin-right:3px;color:var(--muted);}
  .empty-state .icon-xl{margin-bottom:8px;color:var(--muted);}
  .search-wrap{position:relative;margin-bottom:10px;}
  .search-wrap .search-input{padding-left:36px;margin-bottom:0;}
  .search-wrap .search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none;}
  .archived-tag .icon{width:11px;height:11px;vertical-align:-1px;margin-right:3px;}

  /* ARCHIVED + REORDER */
  .archived-tag{display:inline-block;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px;margin-bottom:6px;background:#eee2c4;color:#7a5c00;}
  .drill-card.archived,.saved-card.archived{opacity:.78;background:var(--card2);}
  .reorder-col{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
  .reorder-btn{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:22px;border-radius:3px;font-size:13px;cursor:pointer;line-height:1;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .reorder-btn:active{border-color:var(--primary);color:var(--primary);}
  .reorder-btn:disabled{opacity:.3;cursor:default;}

  /* PRINT */
  @media print{
    body{background:#fff;color:#000;}
    #auth-screen,header,.tabs,.toast,.loading-overlay,.modal-overlay,.drill-actions,.saved-card-actions,.flex-between,.form-card,.section-title::after,#lib-filters,.search-input,#lib-archive-toggle,#saved-archive-toggle,#lib-count,#saved-count{display:none !important;}
    main{padding:0;max-width:none;}
    .tab-panel{display:block !important;}
    .saved-card,.drill-card{box-shadow:none;border:1px solid #999;page-break-inside:avoid;margin-bottom:12px;}
  }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBi2mrYngEjJDzxmZQaxFdrjT17_-sV0Vw",
  authDomain: "sandarna-traningsapp.firebaseapp.com",
  projectId: "sandarna-traningsapp",
  storageBucket: "sandarna-traningsapp.firebasestorage.app",
  messagingSenderId: "829288235305",
  appId: "1:829288235305:web:ecf9831c1876ae6b81f738"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

const THEMES = ['Presspel','Omställning','Passningsspel','Inneslutning','Avslut','Uppspel','Dödbollar','Spelbarhet','Kontra','Rörelse utan boll'];
let drills = [], sessions = [], sessionDrills = [];
let activeFilter = 'alla', newTheme = '', sessionTheme = '', editTheme = '';
let showArchivedDrills = false, showArchivedSessions = false;
let currentUser = null, editingId = null;
let unsubDrills = null, unsubSessions = null;

// ── UTILS ──────────────────────────────────────────────
function toast(msg) {
  const e = document.getElementById('toast');
  e.textContent = msg; e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 2200);
}
function setSyncStatus(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }
function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

// ── AUTH UI ────────────────────────────────────────────
let authMode = 'login';
window.showAuthTab = function(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-register').classList.toggle('active', mode==='register');
  document.getElementById('auth-name-field').style.display = mode==='register' ? 'flex' : 'none';
  document.getElementById('auth-submit').textContent = mode==='login' ? 'Logga in' : 'Skapa konto';
  document.getElementById('auth-error').textContent = '';
};

window.handleAuth = async function() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name     = document.getElementById('auth-name').value.trim();
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email||!password) { errEl.textContent='Fyll i e-post och lösenord.'; return; }
  if (authMode==='register'&&!name) { errEl.textContent='Fyll i ditt namn.'; return; }
  if (authMode==='register'&&password.length<6) { errEl.textContent='Lösenordet måste vara minst 6 tecken.'; return; }
  showLoading(true);
  try {
    if (authMode==='register') {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch(e) {
    showLoading(false);
    const msgs = {'auth/email-already-in-use':'E-postadressen används redan.','auth/invalid-email':'Ogiltig e-postadress.','auth/wrong-password':'Fel lösenord.','auth/user-not-found':'Inget konto med den e-postadressen.','auth/invalid-credential':'Fel e-post eller lösenord.','auth/too-many-requests':'För många försök. Försök igen senare.'};
    errEl.textContent = msgs[e.code]||'Något gick fel, försök igen.';
  }
};

window.handleSignOut = async function() {
  if (unsubDrills) unsubDrills();
  if (unsubSessions) unsubSessions();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  showLoading(false);
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-email-display').textContent = user.displayName||user.email;
    startListeners();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    drills=[]; sessions=[]; sessionDrills=[];
  }
});

function startListeners() {
  unsubDrills = onSnapshot(query(collection(db,'drills'), orderBy('createdAt','desc')), snap => {
    drills = snap.docs.map(d => ({id:d.id,...d.data()}));
    setSyncStatus('ok'); renderDrills(); renderPicker();
  }, () => setSyncStatus('err'));
  unsubSessions = onSnapshot(query(collection(db,'sessions'), orderBy('createdAt','desc')), snap => {
    sessions = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderSaved();
  });
}

// ── TABS ───────────────────────────────────────────────
window.switchTab = function(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='ny-ovning') renderThemePills('new-theme-pills','new');
  if (name==='session') { renderThemePills('session-theme-pills','session'); renderPicker(); renderBuild(); }
  if (name==='sparade') renderSaved();
};

// ── THEME PILLS ────────────────────────────────────────
function renderThemePills(id, mode) {
  const cur = mode==='new' ? newTheme : mode==='session' ? sessionTheme : editTheme;
  document.getElementById(id).innerHTML = THEMES.map(t =>
    `<button class="theme-pill ${cur===t?'selected':''}" onclick="pickTheme('${t}','${mode}')">${t}</button>`
  ).join('');
}
window.pickTheme = function(t, mode) {
  if (mode==='new') { newTheme=newTheme===t?'':t; renderThemePills('new-theme-pills','new'); }
  else if (mode==='session') { sessionTheme=sessionTheme===t?'':t; renderThemePills('session-theme-pills','session'); }
  else { editTheme=editTheme===t?'':t; renderThemePills('edit-theme-pills','edit'); }
};
renderThemePills('new-theme-pills','new');
renderThemePills('session-theme-pills','session');

// ── DRILL LIBRARY ──────────────────────────────────────
window.setFilter = function(el, type) {
  document.querySelectorAll('#lib-filters .filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active'); activeFilter=type; renderDrills();
};

function renderDrills() {
  const q = (document.getElementById('lib-search')?.value||'').toLowerCase();
  const list = drills.filter(d =>
    (showArchivedDrills ? d.archived===true : !d.archived) &&
    (activeFilter==='alla'||d.type===activeFilter) &&
    (!q||d.name.toLowerCase().includes(q)||(d.theme||'').toLowerCase().includes(q)||(d.desc||'').toLowerCase().includes(q))
  );
  const cnt = document.getElementById('lib-count');
  if (cnt) cnt.textContent = list.length ? `${list.length} övning${list.length===1?'':'ar'}` : '';
  const g = document.getElementById('drills-grid'); if (!g) return;
  g.innerHTML = list.length ? list.map(d => {
    const inS = sessionDrills.some(s => s.id===d.id);
    return `<div class="drill-card ${inS?'in-session':''} ${d.archived?'archived':''}">
      ${d.archived?'<span class="archived-tag"><svg class="icon"><use href="#i-archive"/></svg>Arkiverad</span><br>':''}
      <span class="drill-type-badge b-${d.type}">${d.type}</span>
      <h3>${d.name}</h3>
      <div class="drill-meta">
        <span><svg class="icon"><use href="#i-clock"/></svg>${d.duration} min</span>
        ${d.players?`<span><svg class="icon"><use href="#i-users"/></svg>${d.players}</span>`:''}
        ${d.equipment?`<span><svg class="icon"><use href="#i-package"/></svg>${d.equipment}</span>`:''}
      </div>
      ${d.desc?`<div class="drill-desc">${d.desc}</div>`:''}
      ${d.theme?`<span class="dtag">${d.theme}</span>`:''}
      <div class="added-by">Tillagd av ${d.addedByName||'Okänd'}${d.editedByName?` · Senast ändrad av ${d.editedByName}`:''}</div>
      <div class="drill-actions">
        ${d.archived ? `
          <button class="btn btn-ghost btn-sm" onclick="restoreDrill('${d.id}')"><svg class="icon"><use href="#i-rotate-ccw"/></svg>Återställ</button>
          <button class="btn btn-danger btn-sm" onclick="hardDeleteDrill('${d.id}')"><svg class="icon"><use href="#i-trash"/></svg>Ta bort permanent</button>
        ` : `
          <button class="btn btn-ghost btn-sm" onclick="toggleSession('${d.id}','lib')"><svg class="icon"><use href="#${inS?'i-check':'i-plus'}"/></svg>${inS?'Tillagd':'Träning'}</button>
          <button class="btn btn-warning btn-sm" onclick="openEditModal('${d.id}')"><svg class="icon"><use href="#i-pencil"/></svg>Redigera</button>
          <button class="btn btn-danger btn-sm" onclick="archiveDrill('${d.id}')"><svg class="icon"><use href="#i-archive"/></svg>Arkivera</button>
        `}
      </div>
    </div>`;
  }).join('') : `<div class="empty-state" style="grid-column:1/-1"><svg class="icon icon-xl"><use href="#${showArchivedDrills?'i-archive':'i-search'}"/></svg><p>${showArchivedDrills?'Inga arkiverade övningar.':'Inga övningar hittades.'}</p></div>`;
}
window.renderDrills = renderDrills;

window.toggleArchived = function(kind) {
  const setLabel = (btn, on) => {
    btn.classList.toggle('active', on);
    btn.innerHTML = on
      ? '<svg class="icon"><use href="#i-rotate-ccw"/></svg>Visa aktiva'
      : '<svg class="icon"><use href="#i-archive"/></svg>Visa arkiverade';
  };
  if (kind==='drills') {
    showArchivedDrills = !showArchivedDrills;
    setLabel(document.getElementById('lib-archive-toggle'), showArchivedDrills);
    renderDrills();
  } else {
    showArchivedSessions = !showArchivedSessions;
    setLabel(document.getElementById('saved-archive-toggle'), showArchivedSessions);
    renderSaved();
  }
};

// ── EDIT MODAL ─────────────────────────────────────────
window.openEditModal = function(id) {
  const d = drills.find(d => d.id===id); if (!d) return;
  editingId = id;
  editTheme = d.theme||'';
  document.getElementById('e-name').value    = d.name||'';
  document.getElementById('e-type').value    = d.type||'';
  document.getElementById('e-dur').value     = d.duration||'';
  document.getElementById('e-players').value = d.players||'';
  document.getElementById('e-equip').value   = d.equipment||'';
  document.getElementById('e-desc').value    = d.desc||'';
  renderThemePills('edit-theme-pills','edit');
  document.getElementById('edit-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
};

window.closeEditModal = function() {
  document.getElementById('edit-modal').classList.add('hidden');
  document.body.style.overflow = '';
  editingId = null;
};

window.saveEdit = async function() {
  const name = document.getElementById('e-name').value.trim();
  const type = document.getElementById('e-type').value;
  const dur  = parseInt(document.getElementById('e-dur').value);
  if (!name||!type||!dur) { toast('Fyll i namn, typ och tid'); return; }
  setSyncStatus('syncing');
  await updateDoc(doc(db,'drills',editingId), {
    name, type, duration: dur,
    players:   document.getElementById('e-players').value.trim(),
    equipment: document.getElementById('e-equip').value.trim(),
    theme:     editTheme,
    desc:      document.getElementById('e-desc').value.trim(),
    editedByName:  currentUser.displayName||currentUser.email,
    editedAt:      serverTimestamp()
  });
  // Update in active session build if present
  const idx = sessionDrills.findIndex(s => s.id===editingId);
  if (idx>-1) {
    sessionDrills[idx] = {...sessionDrills[idx], name, type, duration:dur, theme:editTheme};
    renderBuild();
  }
  closeEditModal();
  toast('Övning uppdaterad');
};

// Close modal on overlay click
document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target===document.getElementById('edit-modal')) closeEditModal();
});

window.archiveDrill = async function(id) {
  if (!confirm('Arkivera övningen? Den döljs för alla tränare men kan återställas.')) return;
  setSyncStatus('syncing');
  await updateDoc(doc(db,'drills',id), {
    archived: true,
    archivedByName: currentUser.displayName||currentUser.email,
    archivedAt: serverTimestamp()
  });
  sessionDrills = sessionDrills.filter(d => d.id!==id);
  renderBuild(); toast('Övning arkiverad');
};

window.restoreDrill = async function(id) {
  setSyncStatus('syncing');
  await updateDoc(doc(db,'drills',id), { archived: false });
  toast('Övning återställd');
};

window.hardDeleteDrill = async function(id) {
  if (!confirm('Ta bort övningen permanent? Det går inte att ångra.')) return;
  setSyncStatus('syncing');
  await deleteDoc(doc(db,'drills',id));
  toast('Övning permanent borttagen');
};

window.clearDrillForm = function() {
  ['d-name','d-dur','d-players','d-equip','d-desc'].forEach(i => { const e=document.getElementById(i); if(e) e.value=''; });
  document.getElementById('d-type').value='';
  newTheme=''; renderThemePills('new-theme-pills','new');
};

window.saveDrill = async function() {
  const name = document.getElementById('d-name').value.trim();
  const type = document.getElementById('d-type').value;
  const dur  = parseInt(document.getElementById('d-dur').value);
  if (!name||!type||!dur) { toast('Fyll i namn, typ och tid'); return; }
  setSyncStatus('syncing');
  await addDoc(collection(db,'drills'), {
    name, type, duration: dur,
    players:      document.getElementById('d-players').value.trim(),
    equipment:    document.getElementById('d-equip').value.trim(),
    theme:        newTheme,
    desc:         document.getElementById('d-desc').value.trim(),
    addedByName:  currentUser.displayName||currentUser.email,
    addedByEmail: currentUser.email,
    createdAt:    serverTimestamp()
  });
  window.clearDrillForm();
  toast('Övning sparad och delad');
};

// ── SESSION BUILDER ────────────────────────────────────
function renderPicker() {
  const q = (document.getElementById('s-search')?.value||'').toLowerCase();
  const list = drills.filter(d => !q||d.name.toLowerCase().includes(q)||(d.theme||'').toLowerCase().includes(q));
  const el = document.getElementById('picker-list'); if (!el) return;
  el.innerHTML = list.length ? list.map(d => {
    const inS = sessionDrills.some(s => s.id===d.id);
    return `<div class="picker-item ${inS?'in-session':''}">
      <div class="picker-item-info">
        <div class="picker-item-name">${d.name}</div>
        <div class="picker-item-meta">${d.type} · ${d.duration} min${d.theme?' · '+d.theme:''}</div>
      </div>
      <button class="btn ${inS?'btn-primary':'btn-ghost'} btn-sm" onclick="toggleSession('${d.id}','picker')" aria-label="${inS?'Tillagd':'Lägg till'}"><svg class="icon"><use href="#${inS?'i-check':'i-plus'}"/></svg></button>
    </div>`;
  }).join('') : `<div style="color:var(--muted);font-size:13px;padding:12px;">Inga övningar.</div>`;
}
window.renderPicker = renderPicker;

window.toggleSession = function(id, from) {
  const idx = sessionDrills.findIndex(d => d.id===id);
  if (idx>-1) sessionDrills.splice(idx,1);
  else { const d=drills.find(d => d.id===id); if(d) sessionDrills.push({...d}); }
  renderPicker(); renderBuild();
  if (from==='lib') renderDrills();
};

function renderBuild() {
  const el = document.getElementById('session-build');
  const tEl = document.getElementById('session-time');
  if (!el) return;
  if (!sessionDrills.length) {
    el.innerHTML=`<div class="empty-state"><svg class="icon icon-xl"><use href="#i-clipboard"/></svg><p>Välj övningar från listan</p></div>`;
    if(tEl) tEl.textContent=''; return;
  }
  const total = sessionDrills.reduce((s,d) => s+(d.duration||0), 0);
  if (tEl) tEl.textContent=`${total} min`;
  const last = sessionDrills.length-1;
  el.innerHTML = sessionDrills.map((d,i) => `
    <div class="session-item">
      <div class="reorder-col">
        <button class="reorder-btn" onclick="moveBuild(${i},-1)" ${i===0?'disabled':''} aria-label="Flytta upp"><svg class="icon"><use href="#i-chevron-up"/></svg></button>
        <button class="reorder-btn" onclick="moveBuild(${i},1)" ${i===last?'disabled':''} aria-label="Flytta ner"><svg class="icon"><use href="#i-chevron-down"/></svg></button>
      </div>
      <div class="snum">${i+1}</div>
      <div class="session-item-info">
        <div class="session-item-name">${d.name}</div>
        <div class="session-item-meta">${d.type} · ${d.duration} min${d.theme?' · '+d.theme:''}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeBuild(${i})" aria-label="Ta bort"><svg class="icon"><use href="#i-x"/></svg></button>
    </div>`).join('');
}

window.removeBuild = function(i) { sessionDrills.splice(i,1); renderPicker(); renderBuild(); };

window.moveBuild = function(i, delta) {
  const j = i + delta;
  if (j < 0 || j >= sessionDrills.length) return;
  const [item] = sessionDrills.splice(i, 1);
  sessionDrills.splice(j, 0, item);
  renderBuild();
};

window.saveSession = async function() {
  const name = document.getElementById('s-name').value.trim()||'Träning '+new Date().toLocaleDateString('sv-SE');
  const date = document.getElementById('s-date').value||new Date().toISOString().split('T')[0];
  if (!sessionDrills.length) { toast('Lägg till minst en övning'); return; }
  setSyncStatus('syncing');
  await addDoc(collection(db,'sessions'), {
    name, date, theme: sessionTheme,
    drills: sessionDrills.map(d => ({id:d.id,name:d.name,type:d.type,duration:d.duration,theme:d.theme||''})),
    totalTime: sessionDrills.reduce((s,d) => s+(d.duration||0), 0),
    addedByName:  currentUser.displayName||currentUser.email,
    addedByEmail: currentUser.email,
    createdAt: serverTimestamp()
  });
  sessionDrills=[];
  document.getElementById('s-name').value='';
  document.getElementById('s-date').value='';
  sessionTheme=''; renderThemePills('session-theme-pills','session');
  renderPicker(); renderBuild();
  toast('Träning sparad och delad');
};

// ── SAVED SESSIONS ─────────────────────────────────────
function renderSaved() {
  const g = document.getElementById('saved-grid'); if (!g) return;
  const list = sessions.filter(s => showArchivedSessions ? s.archived===true : !s.archived);
  const cnt = document.getElementById('saved-count');
  if (cnt) cnt.textContent = list.length ? `${list.length} träning${list.length===1?'':'ar'}` : '';
  if (!list.length) {
    g.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><svg class="icon icon-xl"><use href="#${showArchivedSessions?'i-archive':'i-bookmark'}"/></svg><p>${showArchivedSessions?'Inga arkiverade träningar.':'Inga sparade träningar ännu.'}</p></div>`;
    return;
  }
  g.innerHTML = list.map(s => `
    <div class="saved-card ${s.archived?'archived':''}">
      ${s.archived?'<span class="archived-tag"><svg class="icon"><use href="#i-archive"/></svg>Arkiverad</span><br>':''}
      <h3>${s.name}</h3>
      <div class="meta">
        <span><svg class="icon"><use href="#i-calendar"/></svg>${new Date(s.date).toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'short'})}</span>
        <span><svg class="icon"><use href="#i-clock"/></svg>${s.totalTime} min</span>
      </div>
      ${s.theme?`<span class="dtag">${s.theme}</span><br>`:''}
      <div class="dlist" style="margin-top:8px;">${(s.drills||[]).map((d,i)=>`${i+1}. ${d.name} <span style="color:var(--muted);">(${d.duration} min)</span>`).join('<br>')}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;">Skapad av ${s.addedByName||'Okänd'}</div>
      <div class="saved-card-actions">
        ${s.archived ? `
          <button class="btn btn-ghost btn-sm" onclick="restoreSession('${s.id}')"><svg class="icon"><use href="#i-rotate-ccw"/></svg>Återställ</button>
          <button class="btn btn-danger btn-sm" onclick="hardDeleteSession('${s.id}')"><svg class="icon"><use href="#i-trash"/></svg>Ta bort permanent</button>
        ` : `
          <button class="btn btn-ghost btn-sm" onclick="loadSession('${s.id}')"><svg class="icon"><use href="#i-external"/></svg>Ladda</button>
          <button class="btn btn-ghost btn-sm" onclick="printSession('${s.id}')"><svg class="icon"><use href="#i-printer"/></svg>Skriv ut / PDF</button>
          <button class="btn btn-danger btn-sm" onclick="archiveSession('${s.id}')"><svg class="icon"><use href="#i-archive"/></svg>Arkivera</button>
        `}
      </div>
    </div>`).join('');
}

window.loadSession = function(id) {
  const s = sessions.find(s => s.id===id); if (!s) return;
  sessionDrills = (s.drills||[]).map(sd => {
    const full = drills.find(d => d.id===sd.id);
    return full ? {...full} : {...sd};
  });
  document.getElementById('s-name').value = s.name;
  document.getElementById('s-date').value = s.date;
  sessionTheme = s.theme||'';
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-session').classList.add('active');
  document.querySelectorAll('.tab-btn')[2].classList.add('active');
  renderThemePills('session-theme-pills','session');
  renderPicker(); renderBuild();
  toast('Träning laddad!');
};

window.archiveSession = async function(id) {
  if (!confirm('Arkivera träningen? Den döljs för alla tränare men kan återställas.')) return;
  setSyncStatus('syncing');
  await updateDoc(doc(db,'sessions',id), {
    archived: true,
    archivedByName: currentUser.displayName||currentUser.email,
    archivedAt: serverTimestamp()
  });
  toast('Träning arkiverad');
};

window.restoreSession = async function(id) {
  setSyncStatus('syncing');
  await updateDoc(doc(db,'sessions',id), { archived: false });
  toast('Träning återställd');
};

window.hardDeleteSession = async function(id) {
  if (!confirm('Ta bort träningen permanent? Det går inte att ångra.')) return;
  setSyncStatus('syncing');
  await deleteDoc(doc(db,'sessions',id));
  toast('Träning permanent borttagen');
};

window.printSession = function(id) {
  const s = sessions.find(s => s.id===id); if (!s) return;
  const dateStr = new Date(s.date).toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fullDrills = (s.drills||[]).map(sd => drills.find(d => d.id===sd.id) || sd);
  const css = `
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    body{padding:32px;color:#222;line-height:1.45;}
    h1{font-size:28px;margin-bottom:4px;}
    .sub{color:#666;font-size:13px;margin-bottom:18px;}
    .meta{font-size:13px;color:#444;margin-bottom:18px;border-bottom:2px solid #3d6b4a;padding-bottom:10px;}
    .meta span{margin-right:18px;}
    .drill{border:1px solid #ccc;border-radius:6px;padding:12px 14px;margin-bottom:10px;page-break-inside:avoid;}
    .drill-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
    .num{background:#3d6b4a;color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0;}
    .drill h2{font-size:16px;}
    .drill .info{color:#666;font-size:12px;margin-bottom:6px;}
    .drill p{font-size:13px;margin-top:4px;}
    .footer{margin-top:24px;font-size:11px;color:#888;border-top:1px solid #ddd;padding-top:8px;}
    @media print{body{padding:14px;}}
  `;
  const drillsHtml = fullDrills.map((d,i) => `
    <div class="drill">
      <div class="drill-head"><span class="num">${i+1}</span><h2>${escapeHtml(d.name)}</h2></div>
      <div class="info">${escapeHtml(d.type||'')} · ${d.duration||'?'} min${d.theme?' · '+escapeHtml(d.theme):''}${d.players?' · Spelare: '+escapeHtml(d.players):''}${d.equipment?' · Material: '+escapeHtml(d.equipment):''}</div>
      ${d.desc?`<p>${escapeHtml(d.desc).replace(/\n/g,'<br>')}</p>`:''}
    </div>
  `).join('');
  const html = `<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><title>${escapeHtml(s.name)} – Sandarna</title><style>${css}</style></head><body>
    <h1>${escapeHtml(s.name)}</h1>
    <div class="sub">Sandarna Tränarverktyget</div>
    <div class="meta">
      <span>Datum: ${dateStr}</span>
      <span>Tid: ${s.totalTime||0} min totalt</span>
      ${s.theme?`<span>Tema: ${escapeHtml(s.theme)}</span>`:''}
    </div>
    ${drillsHtml}
    <div class="footer">Skapad av ${escapeHtml(s.addedByName||'Okänd')}</div>
  </body></html>`;
  const w = window.open('', '_blank');
  if (!w) { toast('Tillåt popup-fönster för att skriva ut'); return; }
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.focus(); w.print(); };
};

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
