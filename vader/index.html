<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderkollen ☀️</title>
<meta name="description" content="Enkel och rolig väderapp på svenska. Sök vilken ort som helst – gratis väderdata.">
<style>
  :root{
    --ink:#16213a;
    --ink-soft:#41506b;
    --muted:#7a87a3;
    --card:rgba(255,255,255,.82);
    --card-solid:#ffffff;
    --line:rgba(22,33,58,.10);
    --accent:#ff8a3d;
    --accent-deep:#ef6c2a;
    --radius:22px;
    --shadow:0 18px 40px rgba(22,33,58,.16);
    --font:"Segoe UI",system-ui,-apple-system,"Trebuchet MS",sans-serif;
    /* sky theme – styrs av JS */
    --sky-a:#7ec8f0;
    --sky-b:#cfeaff;
    --sky-c:#fff4d6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    font-family:var(--font);color:var(--ink);
    background:linear-gradient(160deg,var(--sky-a) 0%,var(--sky-b) 48%,var(--sky-c) 100%);
    background-attachment:fixed;min-height:100vh;
    transition:background .9s ease;
    overflow-x:hidden;
  }
  /* dekorativa solstrålar/moln-prickar */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120px 120px at 82% 12%, rgba(255,255,255,.55), transparent 70%),
      radial-gradient(220px 160px at 12% 4%, rgba(255,255,255,.30), transparent 70%);
  }
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:22px 16px 60px}

  /* ---- Topp ---- */
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.01em;font-size:1.18rem}
  .brand .logo{
    width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:1.15rem;
    background:linear-gradient(135deg,#ffd66b,#ff9d3d);box-shadow:0 6px 14px rgba(239,108,42,.35)
  }
  .geo{
    border:none;cursor:pointer;background:var(--card);color:var(--ink);
    backdrop-filter:blur(8px);border-radius:99px;padding:9px 14px;font-size:.82rem;font-weight:700;
    display:flex;align-items:center;gap:6px;box-shadow:0 6px 16px rgba(22,33,58,.12)
  }
  .geo:active{transform:scale(.95)}

  /* ---- Sök ---- */
  .search{position:relative;margin-bottom:18px}
  .search input{
    width:100%;border:none;border-radius:16px;padding:15px 46px 15px 46px;font-size:1rem;
    background:var(--card-solid);color:var(--ink);box-shadow:var(--shadow);outline:none;font-family:inherit
  }
  .search input::placeholder{color:var(--muted)}
  .search .ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.05rem;opacity:.6}
  .search .clr{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:#eef2f8;
    width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;color:var(--muted);display:none
  }
  .suggest{
    position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--card-solid);border-radius:16px;
    box-shadow:var(--shadow);overflow:hidden;z-index:20;display:none
  }
  .suggest.show{display:block}
  .suggest button{
    width:100%;text-align:left;border:none;background:none;padding:13px 16px;cursor:pointer;
    font-size:.95rem;color:var(--ink);display:flex;align-items:center;gap:10px;font-family:inherit
  }
  .suggest button:hover,.suggest button:focus{background:#f4f7fc;outline:none}
  .suggest button + button{border-top:1px solid var(--line)}
  .suggest .sm{color:var(--muted);font-size:.8rem;margin-left:auto}

  /* ---- Favoriter ---- */
  .favs{display:flex;gap:8px;flex-wrap:wrap;margin:-6px 2px 16px}
  .favs:empty{display:none}
  .fav-chip{
    display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;font-family:inherit;
    background:var(--card);backdrop-filter:blur(8px);color:var(--ink);font-weight:700;font-size:.85rem;
    padding:8px 8px 8px 13px;border-radius:99px;box-shadow:0 6px 14px rgba(22,33,58,.12)
  }
  .fav-chip:active{transform:scale(.95)}
  .fav-chip .x{
    width:20px;height:20px;border-radius:50%;background:rgba(22,33,58,.10);color:var(--ink-soft);
    display:grid;place-items:center;font-size:.8rem;line-height:1
  }
  .fav-chip .x:hover{background:#ffd3d3;color:#c23030}

  .nowhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .fav-star{
    border:none;cursor:pointer;background:rgba(255,255,255,.5);color:#ef9b1e;
    width:42px;height:42px;border-radius:14px;font-size:1.45rem;line-height:1;
    display:grid;place-items:center;flex:0 0 auto;transition:transform .12s ease
  }
  .fav-star:active{transform:scale(.85)}
  .fav-star.on{background:linear-gradient(135deg,#ffd66b,#ff9d3d);color:#fff;box-shadow:0 6px 14px rgba(239,108,42,.35)}

  /* ---- Status (laddar / fel) ---- */
  .status{text-align:center;color:var(--ink-soft);padding:40px 10px;font-size:.95rem;line-height:1.6}
  .status .big{font-size:2.6rem;display:block;margin-bottom:8px}
  .spinner{
    width:30px;height:30px;border-radius:50%;border:3px solid rgba(22,33,58,.18);
    border-top-color:var(--accent);margin:0 auto 14px;animation:spin .8s linear infinite
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- Nuvarande väder ---- */
  .now{
    background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px 22px 18px;margin-bottom:16px;border:1px solid rgba(255,255,255,.5)
  }
  .now .place{font-weight:800;font-size:1.25rem;display:flex;align-items:center;gap:7px}
  .now .place .pin{font-size:.9rem;opacity:.7}
  .now .updated{color:var(--muted);font-size:.78rem;margin-top:2px}
  .now .main{display:flex;align-items:center;gap:6px;margin:6px 0 2px}
  .now .emoji{font-size:4.6rem;line-height:1;filter:drop-shadow(0 6px 10px rgba(22,33,58,.18));animation:pop .5s ease}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .now .temp{font-size:4rem;font-weight:800;letter-spacing:-.03em;margin-left:auto}
  .now .temp small{font-size:1.6rem;font-weight:700;color:var(--muted);vertical-align:top}
  .now .desc{font-size:1.05rem;font-weight:700;color:var(--ink-soft);margin-top:2px}
  .now .feels{color:var(--muted);font-size:.86rem;margin-top:2px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
  .stat{
    background:rgba(255,255,255,.6);border-radius:14px;padding:10px 6px;text-align:center
  }
  .stat .v{font-weight:800;font-size:.98rem;margin-top:3px}
  .stat .k{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .stat .e{font-size:1.05rem}

  /* ---- Roligt vädertips ---- */
  .tip{
    width:100%;text-align:left;border:none;cursor:pointer;font-family:inherit;color:#5a3a12;
    background:linear-gradient(135deg,#fff0c9,#ffe0a8);
    border-radius:var(--radius);padding:15px 18px;margin-bottom:4px;
    box-shadow:0 12px 26px rgba(239,108,42,.18);border:1px solid rgba(255,180,90,.55);
    display:flex;align-items:center;gap:13px;line-height:1.4;
    transition:transform .12s ease
  }
  .tip:active{transform:scale(.985)}
  .tip .tic{font-size:1.9rem;flex:0 0 auto;animation:wobble 2.6s ease-in-out infinite}
  @keyframes wobble{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  .tip .ttx{flex:1}
  .tip .tlbl{display:block;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;font-weight:800;opacity:.6;margin-bottom:2px}
  .tip .tmsg{font-weight:700;font-size:.95rem}
  .tip .more{font-size:.7rem;opacity:.45;flex:0 0 auto;align-self:flex-start}

  /* ---- Shopping-CTA (Amazon) ---- */
  .shop{
    display:flex;align-items:center;gap:13px;text-decoration:none;color:#2a2118;
    background:linear-gradient(135deg,#fff7ec,#ffe9c7);
    border:1px solid rgba(255,153,30,.45);border-radius:var(--radius);
    padding:13px 16px;margin:10px 0 2px;box-shadow:0 10px 24px rgba(239,108,42,.14);
    transition:transform .12s ease,box-shadow .2s ease
  }
  .shop:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(239,108,42,.22)}
  .shop:active{transform:scale(.99)}
  .shop .sic{font-size:1.7rem;flex:0 0 auto}
  .shop .stx{flex:1;display:flex;flex-direction:column;line-height:1.25}
  .shop .slbl{font-size:.72rem;font-weight:700;color:var(--muted)}
  .shop .scta{font-weight:800;font-size:.98rem;color:var(--accent-deep)}
  .shop .samz{
    flex:0 0 auto;font-size:.66rem;font-weight:800;letter-spacing:.04em;color:#7a5a1a;
    background:rgba(255,255,255,.7);padding:5px 9px;border-radius:99px
  }

  /* ---- Sektionsrubrik ---- */
  .section-h{
    font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--ink-soft);
    margin:22px 6px 10px;opacity:.85
  }

  /* ---- Timmar (horisontell scroll) ---- */
  .hours{
    display:flex;gap:9px;overflow-x:auto;padding:4px 2px 8px;scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch
  }
  .hours::-webkit-scrollbar{height:0}
  .hour{
    flex:0 0 auto;scroll-snap-align:start;background:var(--card);backdrop-filter:blur(8px);
    border-radius:16px;padding:12px 6px;width:66px;text-align:center;box-shadow:0 8px 18px rgba(22,33,58,.10);
    border:1px solid rgba(255,255,255,.5)
  }
  .hour.now-h{background:linear-gradient(160deg,#ffe3b0,#ffd089);border-color:#ffca74}
  .hour .h{font-size:.74rem;color:var(--ink-soft);font-weight:700}
  .hour .e{font-size:1.5rem;margin:6px 0 4px}
  .hour .t{font-weight:800;font-size:.95rem}
  .hour .r{font-size:.66rem;color:#3f8ad6;font-weight:700;margin-top:3px;min-height:.85em}

  /* ---- 7 dagar ---- */
  .days{background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;border:1px solid rgba(255,255,255,.5)}
  .day{display:flex;align-items:center;gap:12px;padding:13px 18px}
  .day + .day{border-top:1px solid var(--line)}
  .day .dname{font-weight:700;min-width:74px;text-transform:capitalize}
  .day .de{font-size:1.5rem;width:34px;text-align:center}
  .day .drain{font-size:.74rem;color:#3f8ad6;font-weight:700;min-width:42px}
  .day .bar{flex:1;height:7px;background:rgba(22,33,58,.08);border-radius:99px;position:relative;overflow:hidden}
  .day .bar i{position:absolute;height:100%;border-radius:99px;
    background:linear-gradient(90deg,#7ec8f0,#ffd66b,#ff8a3d)}
  .day .dtemp{min-width:78px;text-align:right;font-weight:700;font-size:.95rem}
  .day .dtemp .lo{color:var(--muted);font-weight:600}

  /* ---- Fot ---- */
  .foot{text-align:center;color:var(--ink-soft);font-size:.78rem;margin-top:26px;line-height:1.7;opacity:.85}
  .foot a{color:var(--accent-deep);text-decoration:none;font-weight:700}
  .hidden{display:none!important}

  /* tangentbordsval i sökförslag */
  .suggest button.active{background:#eaf2fd}
  /* aktiv favorit-chip */
  .fav-chip.active{background:linear-gradient(135deg,#ffe7b0,#ffd58a);box-shadow:0 6px 16px rgba(239,108,42,.25)}
  /* dagens hög/låg i nu-kortet */
  .now .hilo{display:inline-flex;gap:10px;margin-left:8px;font-size:.86rem;font-weight:700}
  .now .hilo .hi{color:var(--accent-deep)} .now .hilo .lo{color:var(--muted)}
  .now .updated{cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .now .updated .rf{opacity:.55;font-size:.78rem}
  /* retry-knapp i felläge */
  .retry{margin-top:14px;border:none;cursor:pointer;font-family:inherit;font-weight:800;
    background:var(--accent);color:#fff;padding:11px 20px;border-radius:99px;font-size:.9rem;
    box-shadow:0 8px 18px rgba(239,108,42,.3)}
  .retry:active{transform:scale(.95)}

  /* tillgänglighet: synlig fokusring */
  a:focus-visible,button:focus-visible,input:focus-visible,
  .fav-chip:focus-visible,.suggest button:focus-visible{
    outline:3px solid #2f6fd6;outline-offset:2px;border-radius:12px
  }

  @media (max-width:380px){
    .now .temp{font-size:3.3rem}
    .now .emoji{font-size:3.8rem}
    .stat .v{font-size:.9rem}
  }
  /* respektera minskad rörelse */
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="logo">⛅</span>Väderkollen</div>
    <button class="geo" id="geoBtn">📍 Min plats</button>
  </div>

  <div class="search">
    <span class="ico">🔍</span>
    <input id="q" type="text" placeholder="Sök ort, t.ex. Göteborg…" autocomplete="off" spellcheck="false">
    <button class="clr" id="clrBtn" aria-label="Rensa">✕</button>
    <div class="suggest" id="suggest"></div>
  </div>

  <div class="favs" id="favs"></div>

  <div id="status" class="status">
    <span class="big">🌤️</span>
    Sök efter en ort eller tryck på <b>📍 Min plats</b> för att se vädret.
  </div>

  <div id="content" class="hidden">
    <div class="now" id="now"></div>

    <button class="tip" id="tip" title="Tryck för nytt tips"></button>

    <a class="shop" id="shop" target="_blank" rel="noopener nofollow sponsored"></a>

    <div class="section-h">Timme för timme</div>
    <div class="hours" id="hours"></div>

    <div class="section-h">7 dagar framåt</div>
    <div class="days" id="days"></div>
  </div>

  <div class="foot">
    Väderdata från <a href="https://open-meteo.com" target="_blank" rel="noopener">Open‑Meteo</a> · helt gratis<br>
    Gjort med ☀️ i Sverige
  </div>
</div>

<script>
(function(){
  "use strict";
  const GEO="https://geocoding-api.open-meteo.com/v1/search";
  const FORECAST="https://api.open-meteo.com/v1/forecast";
  const REVGEO="https://api.bigdatacloud.net/data/reverse-geocode-client";

  /* === Amazon-affiliate ===
     Lägg in din associate-tag här (t.ex. "dittnamn-21") så får du provision
     på allt som köps via shoppingknappen. Tom sträng = vanlig Amazon-länk. */
  const AFFILIATE_TAG="miama38-21";
  function amazonLink(query){
    const tag=AFFILIATE_TAG?`&tag=${encodeURIComponent(AFFILIATE_TAG)}`:"";
    return `https://www.amazon.se/s?k=${encodeURIComponent(query)}${tag}`;
  }
  // Väljer passande produktförslag utifrån vädret.
  function gearFor(c,isDay){
    const code=c.weather_code, t=c.temperature_2m, wind=c.wind_speed_10m, rain=c.precipitation||0;
    const snow=[71,73,75,77,85,86].includes(code);
    const wet=[51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)||rain>=0.2;
    if(snow)                              return {emoji:"🧤",label:"Snö och kyla idag",cta:"Shoppa mössa & vantar",query:"mössa vantar set vinter varm"};
    if(code>=95)                          return {emoji:"🧥",label:"Åska och rusk",cta:"Shoppa regnjacka",query:"regnjacka vattentät unisex"};
    if(wet)                               return {emoji:"☔",label:"Regn i sikte",cta:"Shoppa paraply",query:"paraply hopfällbart vindsäkert"};
    if(t<=0)                              return {emoji:"🧣",label:"Iskallt ute",cta:"Shoppa varma plagg",query:"halsduk mössa ull set"};
    if([0,1].includes(code)&&isDay&&t>=22)return {emoji:"🧴",label:"Stark sol",cta:"Shoppa solkräm & solglasögon",query:"solkräm spf 50 solglasögon"};
    if([0,1].includes(code)&&isDay&&t>=16)return {emoji:"😎",label:"Soligt och fint",cta:"Shoppa solglasögon",query:"solglasögon polariserade unisex"};
    if(wind>=12)                          return {emoji:"💨",label:"Blåsigt idag",cta:"Shoppa vindtät jacka",query:"vindjacka vattentät lätt"};
    if(t<10)                              return {emoji:"🧥",label:"Lite kyligt",cta:"Shoppa höstjacka",query:"höstjacka softshell unisex"};
    return {emoji:"🛍️",label:"Gör dig redo för vädret",cta:"Shoppa utomhusprylar",query:"utomhus friluft prylar"};
  }

  const el=id=>document.getElementById(id);
  const qInput=el('q'), suggest=el('suggest'), statusEl=el('status'),
        content=el('content'), clrBtn=el('clrBtn');

  /* ---- WMO-väderkoder → svensk text + emoji ---- */
  // [dag-emoji, natt-emoji, beskrivning]
  const WMO={
    0:["☀️","🌙","Klart"],
    1:["🌤️","🌙","Mestadels klart"],
    2:["⛅","☁️","Halvklart"],
    3:["☁️","☁️","Molnigt"],
    45:["🌫️","🌫️","Dimma"],
    48:["🌫️","🌫️","Underkyld dimma"],
    51:["🌦️","🌧️","Lätt duggregn"],
    53:["🌦️","🌧️","Duggregn"],
    55:["🌧️","🌧️","Tätt duggregn"],
    56:["🌧️","🌧️","Underkylt duggregn"],
    57:["🌧️","🌧️","Underkylt duggregn"],
    61:["🌦️","🌧️","Lätt regn"],
    63:["🌧️","🌧️","Regn"],
    65:["🌧️","🌧️","Kraftigt regn"],
    66:["🌧️","🌧️","Underkylt regn"],
    67:["🌧️","🌧️","Underkylt regn"],
    71:["🌨️","🌨️","Lätt snöfall"],
    73:["🌨️","🌨️","Snöfall"],
    75:["❄️","❄️","Kraftigt snöfall"],
    77:["🌨️","🌨️","Snökorn"],
    80:["🌦️","🌧️","Lätta skurar"],
    81:["🌧️","🌧️","Regnskurar"],
    82:["⛈️","⛈️","Kraftiga skurar"],
    85:["🌨️","🌨️","Snöbyar"],
    86:["❄️","❄️","Kraftiga snöbyar"],
    95:["⛈️","⛈️","Åska"],
    96:["⛈️","⛈️","Åska med hagel"],
    99:["⛈️","⛈️","Kraftig åska med hagel"]
  };
  function wmo(code,isDay){
    const w=WMO[code]||["❓","❓","Okänt"];
    return {emoji:isDay?w[0]:w[1],desc:w[2]};
  }

  const DAYS=["sön","mån","tis","ons","tor","fre","lör"];
  const DAYS_LONG=["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"];

  function windDir(deg){
    const d=["N","NO","O","SO","S","SV","V","NV"];
    return d[Math.round(deg/45)%8];
  }
  function fmtTime(iso){
    const d=new Date(iso);
    return d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  }

  /* ---- Roliga vädertips ---- */
  // Bygger en lista med passande tips utifrån väder, temp, vind och dygn.
  function buildTips(c,isDay){
    const code=c.weather_code, t=c.temperature_2m, feels=c.apparent_temperature,
          wind=c.wind_speed_10m, rain=c.precipitation||0;
    const snow=[71,73,75,77,85,86].includes(code);
    const wet=[51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)||rain>=0.2;
    const storm=code>=95;
    const fog=[45,48].includes(code);
    const clear=[0,1].includes(code);
    const tips=[];

    if(storm){
      tips.push("⛈️","Åska på gång – håll dig inne och mysa! Perfekt dag för film och varm choklad.",
        "⚡","Naturens eget ljusshow pågår. Dra ur laddaren och njut från fönstret.");
    }
    if(snow){
      tips.push("⛄","Snö! Dags att bygga en snögubbe eller åka pulka. Glöm inte mössan!",
        "🧤","Vantar, mössa och varma sockor – idag bjuder vädret på vintermys.",
        "❄️","Perfekt snöbollsväder. Den som kastar först vinner (oskrivna regler).");
    }
    if(wet && !snow && !storm){
      tips.push("☔","Ta med paraply – annars blir frisyren en överraskning.",
        "🌧️","Regnkläder på! Eller stanna inne med en bok och en kopp te.",
        "🦆","Det är ankväder ute. Stövlar på och hoppa i pölarna – ingen ser ändå.");
    }
    if(fog){
      tips.push("🌫️","Dimmigt och mystiskt. Kör försiktigt och tänd lyktorna.",
        "👻","Sikten är som i en skräckfilm. Perfekt för en lugn promenad.");
    }
    if((t<=-5||feels<=-8) && !storm){
      tips.push("🥶","Iskallt! Lager på lager och en termos med något varmt är räddningen.",
        "🧣","Det biter i kinderna idag. Halsduk över näsan och full fart!");
    } else if(t<3 && !snow && !storm){
      tips.push("🧥","Kyligt – ta på en extra tröja innan du går ut.",
        "☕","Lagom kallt för en varm dryck och en rejäl jacka.");
    }
    if(t>=26){
      tips.push("🥵","Hetta! Drick mycket vatten, sök skugga och ta det lugnt mitt på dagen.",
        "🍦","Glassväder utan tvekan. Solkräm först, glass sen.",
        "🏊","Perfekt dag för ett dopp – havet, sjön eller trädgårdsslangen.");
    } else if(clear && isDay && t>=18){
      tips.push("😎","Strålande! Solglasögon på och passa på att vara ute.",
        "🧺","Picknickväder! Plocka ihop en korg och hitta en fin gräsplätt.",
        "🌳","Soligt och skönt – ladda D-vitamin medan chansen finns.");
    } else if(clear && isDay){
      tips.push("🌤️","Klart och fint – en promenad sitter aldrig fel idag.",
        "🚶","Snäll väderlek. Lämna soffan, ta en sväng ut.");
    }
    if(wind>=12 && !storm){
      tips.push("💨","Blåsigt! Håll i hatten – och kanske inte dagen för paraply.",
        "🪁","Perfekt drakflygarväder. Eller frisyr-förstörarväder, beror på.");
    }
    if(clear && !isDay){
      tips.push("🌙","Klar natt – kika upp, kanske syns både stjärnor och planeter.",
        "✨","Stjälklart ute. Ett perfekt tillfälle att blicka uppåt.");
    }
    // Alltid något kul kvar om inget annat matchar (t.ex. halvklart, milt)
    if(!tips.length){
      tips.push("🙂","Helt okej väder! Inget extremt – gör precis vad du känner för.",
        "🌥️","Mittemellan-väder. En lätt jacka räcker oftast långt.",
        "👍","Lugnt på väderfronten. Passa på att göra det där du skjutit upp.");
    }
    return tips;
  }

  let TIP_POOL=[], TIP_LAST=-1;
  function showTip(){
    if(!TIP_POOL.length) return;
    let i=Math.floor(Math.random()*(TIP_POOL.length/2));
    if(TIP_POOL.length>2 && i===TIP_LAST) i=(i+1)%(TIP_POOL.length/2);
    TIP_LAST=i;
    const emoji=TIP_POOL[i*2], msg=TIP_POOL[i*2+1];
    el('tip').innerHTML=`<span class="tic">${emoji}</span>
      <span class="ttx"><span class="tlbl">Dagens tips</span><span class="tmsg">${msg}</span></span>
      <span class="more">↻</span>`;
  }
  el('tip').onclick=showTip;

  /* ---- Bakgrundstema efter väder + dygn ---- */
  function setSky(code,isDay){
    const r=document.documentElement.style;
    let a,b,c;
    if(!isDay){ a="#1c2b4a"; b="#2e3f63"; c="#46577d"; }
    else if([0,1].includes(code)){ a="#5fb6ef"; b="#bfe6ff"; c="#fff3cf"; }      // sol
    else if([2,3,45,48].includes(code)){ a="#8fa9c4"; b="#cdd9e6"; c="#eef2f6"; }// moln
    else if(code>=71 && code<=86){ a="#aebfd4"; b="#dde6f0"; c="#f4f8fc"; }      // snö
    else if(code>=95){ a="#54607a"; b="#7d8aa3"; c="#aab3c6"; }                  // åska
    else { a="#6f8fb0"; b="#aac3da"; c="#d6e4ee"; }                             // regn
    r.setProperty('--sky-a',a); r.setProperty('--sky-b',b); r.setProperty('--sky-c',c);
    if(!isDay) document.body.style.color="#16213a";
  }

  function showStatus(html,spinner){
    statusEl.innerHTML=spinner?'<div class="spinner"></div>'+html:html;
    statusEl.classList.remove('hidden');
    content.classList.add('hidden');
  }

  /* ---- Sökförslag (debouncad) ---- */
  let t=null, lastQ="";
  qInput.addEventListener('input',()=>{
    const v=qInput.value.trim();
    clrBtn.style.display=v?'block':'none';
    if(t) clearTimeout(t);
    if(v.length<2){ suggest.classList.remove('show'); return; }
    t=setTimeout(()=>geocode(v),280);
  });
  clrBtn.onclick=()=>{ qInput.value=""; clrBtn.style.display='none'; suggest.classList.remove('show'); qInput.focus(); };
  document.addEventListener('click',e=>{
    if(!e.target.closest('.search')) suggest.classList.remove('show');
  });
  let selIdx=-1;
  function highlight(){
    const btns=[...suggest.querySelectorAll('button')];
    btns.forEach((b,i)=>b.classList.toggle('active',i===selIdx));
    if(selIdx>=0 && btns[selIdx]) btns[selIdx].scrollIntoView({block:'nearest'});
  }
  qInput.addEventListener('keydown',e=>{
    const btns=[...suggest.querySelectorAll('button')];
    if(e.key==='ArrowDown'){ e.preventDefault(); if(!btns.length) return; selIdx=(selIdx+1)%btns.length; highlight(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); if(!btns.length) return; selIdx=(selIdx-1+btns.length)%btns.length; highlight(); }
    else if(e.key==='Enter'){ (btns[selIdx]||btns[0])?.click(); }
    else if(e.key==='Escape'){ suggest.classList.remove('show'); selIdx=-1; }
  });

  async function geocode(name){
    lastQ=name;
    try{
      const r=await fetch(`${GEO}?name=${encodeURIComponent(name)}&count=6&language=sv&format=json`);
      const j=await r.json();
      if(lastQ!==name) return; // föråldrat svar
      const res=j.results||[];
      if(!res.length){ suggest.classList.remove('show'); return; }
      suggest.innerHTML=res.map(p=>{
        const parts=[p.admin1,p.country].filter(Boolean).join(', ');
        return `<button data-lat="${p.latitude}" data-lon="${p.longitude}" data-name="${esc(p.name)}">
          <span>📍</span><b>${esc(p.name)}</b><span class="sm">${esc(parts)}</span></button>`;
      }).join('');
      suggest.querySelectorAll('button').forEach(b=>{
        b.onclick=()=>{
          suggest.classList.remove('show');
          qInput.value=b.dataset.name;
          clrBtn.style.display='block';
          loadWeather(+b.dataset.lat,+b.dataset.lon,b.dataset.name);
          saveLast(+b.dataset.lat,+b.dataset.lon,b.dataset.name);
        };
      });
      selIdx=-1;
      suggest.classList.add('show');
    }catch(e){ suggest.classList.remove('show'); }
  }
  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  /* ---- Geolokalisering ---- */
  el('geoBtn').onclick=()=>{
    if(!navigator.geolocation){ alert("Din enhet stöder inte platstjänster."); return; }
    showStatus("Letar upp din plats…",true);
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const {latitude:lat,longitude:lon}=pos.coords;
        const name=await reverseName(lat,lon);
        qInput.value=name;
        loadWeather(lat,lon,name);
        saveLast(lat,lon,name);
      },
      ()=>{ showStatus('<span class="big">📍</span>Kunde inte hämta din plats. Sök på en ort istället.'); },
      {enableHighAccuracy:false,timeout:10000,maximumAge:300000}
    );
  };
  async function reverseName(lat,lon){
    // Gratis reverse-geocoding utan nyckel för att visa ett riktigt ortnamn.
    try{
      const r=await fetch(`${REVGEO}?latitude=${lat}&longitude=${lon}&localityLanguage=sv`);
      const j=await r.json();
      const n=j.city||j.locality||j.principalSubdivision;
      if(n) return n;
    }catch(e){}
    return "Min plats";
  }

  /* ---- Hämta & rendera väder ---- */
  let current=null;
  async function loadWeather(lat,lon,name){
    current={lat,lon,name};
    showStatus("Hämtar vädret…",true);
    try{
      const url=`${FORECAST}?latitude=${lat}&longitude=${lon}`+
        `&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m,is_day`+
        `&hourly=temperature_2m,weather_code,precipitation_probability,is_day`+
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset`+
        `&timezone=auto&forecast_days=7`;
      const r=await fetch(url);
      if(!r.ok) throw new Error("nät");
      const d=await r.json();
      render(d,name);
    }catch(e){
      showStatus('<span class="big">⚠️</span>Kunde inte hämta vädret just nu.<br><button class="retry" id="retryBtn">Försök igen</button>');
      const rb=el('retryBtn');
      if(rb) rb.onclick=()=>loadWeather(lat,lon,name);
    }
  }

  function render(d,name){
    const c=d.current, isDay=c.is_day===1;
    const w=wmo(c.weather_code,isDay);
    setSky(c.weather_code,isDay);

    /* Nuvarande */
    const sunrise=d.daily.sunrise?.[0], sunset=d.daily.sunset?.[0];
    const tmax=Math.round(d.daily.temperature_2m_max[0]), tmin=Math.round(d.daily.temperature_2m_min[0]);
    el('now').innerHTML=`
      <div class="nowhead">
        <div>
          <div class="place"><span class="pin">📍</span>${esc(name)}</div>
          <div class="updated" id="updated" role="button" tabindex="0" title="Tryck för att uppdatera">Uppdaterat ${fmtTime(c.time)} <span class="rf">↻</span></div>
        </div>
        <button class="fav-star" id="favStar" aria-label="Spara som favorit">☆</button>
      </div>
      <div class="main">
        <span class="emoji">${w.emoji}</span>
        <span class="temp">${Math.round(c.temperature_2m)}<small>°</small></span>
      </div>
      <div class="desc">${w.desc}</div>
      <div class="feels">Känns som ${Math.round(c.apparent_temperature)}°
        <span class="hilo"><span class="hi">↑${tmax}°</span><span class="lo">↓${tmin}°</span></span>
      </div>
      <div class="stats">
        <div class="stat"><div class="e">💧</div><div class="v">${c.relative_humidity_2m}%</div><div class="k">Fukt</div></div>
        <div class="stat"><div class="e">💨</div><div class="v">${Math.round(c.wind_speed_10m)} <span style="font-size:.7rem">m/s</span></div><div class="k">${windDir(c.wind_direction_10m)}</div></div>
        <div class="stat"><div class="e">🌧️</div><div class="v">${(c.precipitation||0)} mm</div><div class="k">Nederbörd</div></div>
        <div class="stat"><div class="e">${isDay?'🌇':'🌅'}</div><div class="v">${isDay&&sunset?fmtTime(sunset):(sunrise?fmtTime(sunrise):'–')}</div><div class="k">${isDay?'Solnedgång':'Soluppgång'}</div></div>
      </div>`;

    /* Favorit-stjärna */
    el('favStar').onclick=toggleFav;
    updateFavStar();

    /* Uppdatera genom att trycka på tidsstämpeln */
    const up=el('updated');
    const refresh=()=>{ if(current) loadWeather(current.lat,current.lon,current.name); };
    up.onclick=refresh;
    up.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); refresh(); } };

    /* Roligt tips baserat på vädret */
    TIP_POOL=buildTips(c,isDay); TIP_LAST=-1; showTip();

    /* Shopping-CTA baserad på vädret */
    const g=gearFor(c,isDay), shop=el('shop');
    shop.href=amazonLink(g.query);
    shop.innerHTML=`<span class="sic">${g.emoji}</span>
      <span class="stx"><span class="slbl">${g.label}</span><span class="scta">${g.cta} →</span></span>
      <span class="samz">Amazon</span>`;

    /* Timmar – nästa 24h från nu */
    const H=d.hourly, nowIdx=nearestHourIndex(H.time,c.time);
    let hh="";
    for(let i=nowIdx;i<Math.min(nowIdx+24,H.time.length);i++){
      const hw=wmo(H.weather_code[i],H.is_day[i]===1);
      const pr=H.precipitation_probability?.[i];
      hh+=`<div class="hour ${i===nowIdx?'now-h':''}">
        <div class="h">${i===nowIdx?'Nu':new Date(H.time[i]).getHours()+':00'}</div>
        <div class="e">${hw.emoji}</div>
        <div class="t">${Math.round(H.temperature_2m[i])}°</div>
        <div class="r">${pr>=10?'💧'+pr+'%':''}</div>
      </div>`;
    }
    el('hours').innerHTML=hh;

    /* 7 dagar */
    const D=d.daily;
    let lo=Math.min(...D.temperature_2m_min), hi=Math.max(...D.temperature_2m_max), span=Math.max(1,hi-lo);
    let dd="";
    for(let i=0;i<D.time.length;i++){
      const dw=wmo(D.weather_code[i],true);
      const dn=new Date(D.time[i]).getDay();
      const min=D.temperature_2m_min[i], max=D.temperature_2m_max[i];
      const left=((min-lo)/span)*100, width=Math.max(8,((max-min)/span)*100);
      const pr=D.precipitation_probability_max?.[i];
      dd+=`<div class="day">
        <div class="dname">${i===0?'Idag':DAYS_LONG[dn]}</div>
        <div class="de">${dw.emoji}</div>
        <div class="drain">${pr>=10?'💧'+pr+'%':''}</div>
        <div class="bar"><i style="left:${left}%;width:${width}%"></i></div>
        <div class="dtemp"><span class="lo">${Math.round(min)}°</span> &nbsp;${Math.round(max)}°</div>
      </div>`;
    }
    el('days').innerHTML=dd;

    statusEl.classList.add('hidden');
    content.classList.remove('hidden');
  }

  function nearestHourIndex(times,nowIso){
    const now=new Date(nowIso).getTime();
    let best=0,diff=Infinity;
    for(let i=0;i<times.length;i++){
      const dt=Math.abs(new Date(times[i]).getTime()-now);
      if(dt<diff && new Date(times[i]).getTime()>=now-1800000){ diff=dt; best=i; }
    }
    return best;
  }

  /* ---- Generisk lagring (window.storage med localStorage som reserv) ---- */
  async function store(key,val){
    const s=JSON.stringify(val);
    try{ if(window.storage?.set){ await window.storage.set(key,s); return; } }catch(e){}
    try{ localStorage.setItem(key,s); }catch(e){}
  }
  async function read(key){
    let raw=null;
    try{ const r=await window.storage?.get(key); raw=r&&r.value; }catch(e){}
    if(raw==null){ try{ raw=localStorage.getItem(key); }catch(e){} }
    if(raw==null) return null;
    try{ return JSON.parse(raw); }catch(e){ return null; }
  }

  /* ---- Senaste plats ---- */
  function saveLast(lat,lon,name){ store('vader_last',{lat,lon,name}); }
  async function loadLast(){
    const p=await read('vader_last');
    if(p && typeof p.lat==='number'){
      qInput.value=p.name; clrBtn.style.display='block';
      loadWeather(p.lat,p.lon,p.name);
      return true;
    }
    return false;
  }

  /* ---- Favoriter ---- */
  let FAVS=[];
  const favKey=(lat,lon)=>lat.toFixed(3)+','+lon.toFixed(3);
  function isFav(lat,lon){ return FAVS.some(f=>favKey(f.lat,f.lon)===favKey(lat,lon)); }

  function renderFavs(){
    const ck=current?favKey(current.lat,current.lon):null;
    el('favs').innerHTML=FAVS.map((f,i)=>
      `<span class="fav-chip ${favKey(f.lat,f.lon)===ck?'active':''}" data-i="${i}"><span class="lbl">⭐ ${esc(f.name)}</span>`+
      `<span class="x" data-rm="${i}" role="button" aria-label="Ta bort">✕</span></span>`
    ).join('');
    el('favs').querySelectorAll('.fav-chip').forEach(chip=>{
      chip.querySelector('.lbl').onclick=()=>{
        const f=FAVS[+chip.dataset.i];
        qInput.value=f.name; clrBtn.style.display='block';
        suggest.classList.remove('show');
        loadWeather(f.lat,f.lon,f.name); saveLast(f.lat,f.lon,f.name);
      };
      chip.querySelector('.x').onclick=e=>{
        e.stopPropagation();
        FAVS.splice(+chip.dataset.rm,1); store('vader_favs',FAVS);
        renderFavs(); updateFavStar();
      };
    });
  }
  function toggleFav(){
    if(!current) return;
    const k=favKey(current.lat,current.lon);
    const idx=FAVS.findIndex(f=>favKey(f.lat,f.lon)===k);
    if(idx>=0) FAVS.splice(idx,1);
    else FAVS.push({lat:current.lat,lon:current.lon,name:current.name});
    store('vader_favs',FAVS); renderFavs(); updateFavStar();
  }
  function updateFavStar(){
    const star=el('favStar'); if(!star||!current) return;
    const on=isFav(current.lat,current.lon);
    star.textContent=on?'★':'☆';
    star.classList.toggle('on',on);
    star.title=on?'Ta bort favorit':'Spara som favorit';
    renderFavs(); // uppdatera aktiv markering
  }

  /* ---- Start ---- */
  (async function init(){
    const f=await read('vader_favs');
    if(Array.isArray(f)) FAVS=f.filter(x=>x&&typeof x.lat==='number');
    renderFavs();
    loadLast();
  })();
})();
</script>
</body>
</html>
